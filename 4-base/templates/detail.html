<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ bot.name }} - 가제: "Code: 400-Error"</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet"/>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans KR", sans-serif;
        color: #dffcff;
        background:
          radial-gradient(circle at 70% 30%, rgba(0, 204, 255, 0.16), transparent 35%),
          radial-gradient(circle at 20% 70%, rgba(0, 74, 130, 0.35), transparent 40%),
          linear-gradient(135deg, #02060d 0%, #06111c 45%, #010308 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          linear-gradient(rgba(0, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(circle, black 40%, transparent 80%);
        pointer-events: none;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: linear-gradient(
          transparent 0%,
          rgba(0, 255, 255, 0.04) 50%,
          transparent 100%
        );
        background-size: 100% 4px;
        opacity: 0.45;
        pointer-events: none;
      }      

      .modal-container {
        position: relative;
        width: min(92%, 620px);
        padding: 1px;
        border-radius: 22px;
        background: linear-gradient(
          135deg,
          rgba(0, 229, 255, 0.9),
          rgba(0, 88, 160, 0.15),
          rgba(0, 229, 255, 0.55)
        );
        box-shadow:
          0 0 36px rgba(0, 204, 255, 0.25),
          inset 0 0 30px rgba(0, 204, 255, 0.08);
      }

      .modal-inner {
        border-radius: 22px;
        overflow: hidden;
        background: rgba(3, 10, 18, 0.88);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(124, 234, 255, 0.18);
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px;
        border-bottom: 1px solid rgba(0, 224, 255, 0.22);
        background: rgba(0, 22, 36, 0.75);
      }

      .modal-header h2 {
        margin: 0;
        font-family: "Orbitron", sans-serif;
        letter-spacing: 0.18em;
        font-size: 0.95rem;
        color: #8ff6ff;
        text-shadow: 0 0 12px rgba(0, 229, 255, 0.9);
      }

      .modal-header-controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .audio-toggle-btn {
        padding: 7px 10px;
        border: 1px solid rgba(143, 246, 255, 0.35);
        border-radius: 8px;
        background: rgba(0, 18, 30, 0.55);
        color: #bfffff;
        font-family: "Orbitron", sans-serif;
        font-size: 0.65rem;
        letter-spacing: 0.08em;
        cursor: pointer;
        white-space: nowrap;
        box-shadow:
          0 0 12px rgba(0, 229, 255, 0.14),
          inset 0 0 12px rgba(0, 229, 255, 0.06);
      }

      .audio-toggle-btn:hover {
        color: #ffffff;
        border-color: rgba(143, 246, 255, 0.85);
        background: rgba(0, 229, 255, 0.12);
      }

      .status {
        font-size: 0.75rem;
        color: #ff4d6d;
        letter-spacing: 0.12em;
        animation: blink 1.4s infinite;
      }

      .close-btn {
        background: transparent;
        border: 1px solid rgba(143, 246, 255, 0.35);
        color: #8ff6ff;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        font-size: 1.2rem;
        cursor: pointer;
        transition: 0.2s;
      }

      .close-btn:hover {
        background: rgba(0, 229, 255, 0.15);
        box-shadow: 0 0 14px rgba(0, 229, 255, 0.5);
      }

      .modal-content {
        padding: 34px;
      }

      .ai-core {
        width: 160px;
        height: 160px;
        margin: 0 auto 26px;
        border-radius: 50%;
        position: relative;
        background:
          radial-gradient(circle, rgba(190, 255, 255, 1) 0%, rgba(0, 229, 255, 0.75) 18%, rgba(0, 97, 150, 0.28) 48%, transparent 70%);
        box-shadow:
          0 0 24px rgba(0, 229, 255, 0.9),
          0 0 70px rgba(0, 153, 255, 0.45);
        animation: pulse 2.6s infinite ease-in-out;
      }

      .ai-core::before,
      .ai-core::after {
        content: "";
        position: absolute;
        inset: 14px;
        border-radius: 50%;
        border: 1px solid rgba(155, 245, 255, 0.6);
      }

      .ai-core::after {
        inset: 34px;
        border-style: dashed;
        animation: rotate 12s linear infinite;
      }

      .bot-info {
        text-align: center;
      }

      .bot-info h1 {
        margin: 0;
        font-family: "Orbitron", sans-serif;
        font-size: 2.45rem;
        letter-spacing: 0.16em;
        color: #e8feff;
        text-shadow:
          0 0 8px rgba(0, 229, 255, 0.9),
          0 0 22px rgba(0, 120, 255, 0.7);
      }

      .subtitle {
        margin: 12px 0 24px;
        color: #86dff2;
        font-size: 0.95rem;
        line-height: 1.7;
      }

      .warning-box {
        margin: 22px 0;
        padding: 14px 16px;
        border: 1px solid rgba(255, 68, 105, 0.45);
        background: rgba(95, 0, 20, 0.18);
        color: #ff9caf;
        font-size: 0.88rem;
        line-height: 1.6;
        border-radius: 12px;
        box-shadow: inset 0 0 20px rgba(255, 68, 105, 0.06);
      }

      .input-panel {
        margin-top: 24px;
        padding: 20px;
        border: 1px solid rgba(0, 229, 255, 0.22);
        border-radius: 16px;
        background: rgba(0, 26, 42, 0.55);
      }

      .form-row {
        margin-bottom: 16px;
      }

      .form-row label {
        display: block;
        margin-bottom: 7px;
        color: #9df7ff;
        font-size: 0.9rem;
        letter-spacing: 0.08em;
      }

      .form-row input,
      .form-row select {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(0, 229, 255, 0.35);
        background: rgba(0, 7, 15, 0.86);
        color: #e8feff;
        font-size: 1rem;
        outline: none;
        transition: 0.2s;
      }

      .form-row input:focus,
      .form-row select:focus {
        border-color: #00e5ff;
        box-shadow: 0 0 16px rgba(0, 229, 255, 0.35);
      }

      .start-chat {
        display: block;
        width: 100%;
        margin-top: 22px;
        padding: 15px 20px;
        border-radius: 12px;

        /* darker border */
        border: 1px solid rgba(0, 229, 255, 0.4);

        /* darker blue gradient */
        background: linear-gradient(90deg, #001923, #003a5a, #001923);

        /* brighter text */
        color: #bfffff;

        font-weight: 700;
        text-decoration: none;
        text-align: center;
        letter-spacing: 0.12em;

        /* stronger glow */
        box-shadow:
          0 0 20px rgba(0, 229, 255, 0.6),
          inset 0 0 18px rgba(0, 229, 255, 0.25);

        transition: 0.2s;
      }

      .start-chat:hover {
        transform: translateY(-2px);
        box-shadow:
          0 0 28px rgba(0, 229, 255, 0.75),
          inset 0 0 18px rgba(255, 255, 255, 0.35);
      }

      .system-line {
        margin-top: 20px;
        font-family: "Orbitron", sans-serif;
        font-size: 0.72rem;
        color: rgba(143, 246, 255, 0.58);
        text-align: center;
        letter-spacing: 0.14em;
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 0.85;
        }
        50% {
          transform: scale(1.06);
          opacity: 1;
        }
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes blink {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }

      @media (max-width: 520px) {
        .modal-content {
          padding: 26px 20px;
        }

        .modal-header {
          flex-wrap: wrap;
          gap: 10px;
        }

        .modal-header-controls {
          width: 100%;
          justify-content: flex-end;
        }

        .bot-info h1 {
          font-size: 1.9rem;
        }

        .ai-core {
          width: 130px;
          height: 130px;
        }
      }
    </style>
  </head>
  <body>
    <div class="modal-container">
      <div class="modal-inner">
        <div class="modal-header">
          <span class="status">WARNING: ROUTE DEVIATION</span>
          <h2>{{ bot.name }}</h2>

          <div class="modal-header-controls">
            <button class="audio-toggle-btn" id="sfx-toggle" type="button">SFX: ON</button>
            <button class="audio-toggle-btn" id="bgm-toggle" type="button">BGM: ON</button>

            <button
              class="close-btn"
              onclick="history.back()"
            >
              &times;
            </button>
          </div>
        </div>
      </div>

      <div class="modal-content">
        <div class="ai-core"></div>

        <div class="bot-info">
          <h1>HS-004</h1>
          <p class="subtitle">
            화성 정착 계획 10년차.<br />
            당신은 기억을 잃은 채 노후 화물선 안에서 깨어났습니다.
          </p>

          <!-- <div class="tags">
            {% for tag in bot.tags %}
            <span class="tag">{{ tag }}</span>
            {% endfor %}
          </div> -->
        </div>

        <div class="warning-box">
          SYSTEM NOTICE: 산소 수치 불안정. 항로 데이터 손상 감지.
          HS-004의 안내에 따라 신원 정보를 입력하십시오.
        </div>

        <!-- <div class="username-area">
          <label for="username">이름:</label>
          <input type="text" id="username" placeholder="이름을 입력하세요" />
        </div>

        <div class="usergender-area">
          <label for="usergender">성별:</label>
          <select name="usergender" id = "usergender">
            <option value="">성별을 선택하세요</option>
            <option value = "남성">남성</option>
            <option value = "여성">여성</option>
          </select>
        </div>   -->

        <div class="input-panel">
          <div class="form-row">
            <label for="username">CREW NAME</label>
            <input type="text" id="username" />
          </div>

          <div class="form-row">
            <label for="usergender">CREW GENDER</label>
            <select name="usergender" id="usergender">
              <option value="">성별을 선택하세요</option>
              <option value="남성">남성</option>
              <option value="여성">여성</option>
            </select>
          </div>
        </div>

        <a href="#" class="start-chat" id="start-chat-btn">우주 항해 시작하기</a>
        <div class="system-line">
          HS-004 // AUTONOMOUS CARGO CONTROL SYSTEM
        </div>
      </div>
    </div>

    <audio id="page-bgm" src="{{ url_for('static', filename='audio/chatbot/Holst_Mars.mp3') }}" preload="none" loop></audio>
    <audio id="ambient-sfx" src="{{ url_for('static', filename='audio/chatbot/Ambient.mp3') }}" preload="none" loop></audio>
    <script src="{{ url_for('static', filename='js/audio-controls.js') }}"></script>

    <script>
      const startChatBtn = document.getElementById("start-chat-btn");
      const usernameInput = document.getElementById("username");
      const usergenderInput = document.getElementById("usergender");

      startChatBtn.addEventListener("click", function (event) {
        event.preventDefault();
        const username = usernameInput.value.trim() || "사용자";
        const usergender = usergenderInput.value.trim() || "미정";
        window.location.href = `/chat?username=${encodeURIComponent(username)}&usergender=${encodeURIComponent(usergender)}`;
      });

      usernameInput.addEventListener("keypress", function (event) {
        if (event.key === "Enter") {
          startChatBtn.click();
        }
      });
    </script>
  </body>
</html>
