<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ bot_name }}와 대화하기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=Orbitron:wght@500;700&display=swap"
    rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: "IBM Plex Sans KR", sans-serif;
      background:
        radial-gradient(circle at 70% 20%, rgba(0, 204, 255, 0.14), transparent 35%),
        radial-gradient(circle at 10% 80%, rgba(0, 66, 120, 0.38), transparent 42%),
        linear-gradient(135deg, #01040a 0%, #06101c 45%, #02030a 100%);
      color: #dffcff;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      opacity: 0.55;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(transparent 0%,
          rgba(0, 255, 255, 0.035) 50%,
          transparent 100%);
      background-size: 100% 4px;
      pointer-events: none;
      opacity: 0.45;
    }

    .game-shell {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: 88px 1fr;
      background: rgba(0, 0, 0, 0.16);
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
      background: rgba(4, 18, 34, 0.9);
      border-bottom: 1px solid rgba(0, 229, 255, 0.28);
      box-shadow: 0 0 25px rgba(0, 229, 255, 0.12);
    }

    .system-title {
      font-family: "Orbitron", sans-serif;
      letter-spacing: 0.18em;
      color: #8ff6ff;
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.8);
    }

    .top-status {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .status-card {
      min-width: 220px;
      padding: 10px 16px;
      border: 1px solid rgba(143, 246, 255, 0.45);
      background: rgba(0, 18, 30, 0.9);
      box-shadow:
        0 0 16px rgba(0, 229, 255, 0.14),
        inset 0 0 18px rgba(0, 229, 255, 0.08);
    }

    .status-label {
      font-family: "Orbitron", sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: rgba(191, 255, 255, 0.75);
      margin-bottom: 4px;
    }

    .status-value {
      font-family: "Orbitron", sans-serif;
      font-size: 1.3rem;
      color: #bfffff;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.8);
    }

    .timer-card.hidden {
      display: none;
    }

    .top-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .audio-toggle-btn {
      height: 42px;
      padding: 0 12px;
      border-radius: 8px;
      background: rgba(0, 18, 30, 0.35);
      border: 1px solid rgba(143, 246, 255, 0.45);
      color: #bfffff;
      font-family: "Orbitron", sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      box-shadow:
        0 0 14px rgba(0, 229, 255, 0.12),
        inset 0 0 18px rgba(0, 229, 255, 0.04);
      transition: 0.2s;
    }

    .audio-toggle-btn:hover {
      color: #ffffff;
      background: rgba(0, 229, 255, 0.13);
      border-color: rgba(143, 246, 255, 0.9);
      box-shadow:
        0 0 18px rgba(0, 229, 255, 0.45),
        inset 0 0 18px rgba(0, 229, 255, 0.12);
    }

    .close-btn {
      width: auto;
      height: 48px;
      min-width: 132px;
      min-height: 48px;

      padding: 0 18px;
      margin: 0;

      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 8px;
      background: rgba(0, 18, 30, 0.35);
      border: 1px solid rgba(143, 246, 255, 0.55);

      color: #bfffff;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0;

      cursor: pointer;
      box-shadow:
        0 0 14px rgba(0, 229, 255, 0.12),
        inset 0 0 18px rgba(0, 229, 255, 0.04);

      transition: 0.2s;
    }

    .close-btn:hover {
      color: #ffffff;
      background: rgba(0, 229, 255, 0.13);
      border-color: rgba(143, 246, 255, 0.9);
      box-shadow:
        0 0 18px rgba(0, 229, 255, 0.45),
        inset 0 0 18px rgba(0, 229, 255, 0.12);
    }

    .main-layout {
      min-height: 0;
      display: grid;
      grid-template-columns: 340px 1fr;
    }

    .side-panel {
      padding: 28px 22px;
      background: rgba(3, 9, 14, 0.86);
      border-right: 1px solid rgba(0, 229, 255, 0.18);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .character-card {
      width: 100%;
      aspect-ratio: 4 / 5;
      border: 1px solid rgba(143, 246, 255, 0.3);
      background:
        radial-gradient(circle at center, rgba(0, 229, 255, 0.18), transparent 62%),
        rgba(0, 17, 28, 0.86);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: inset 0 0 26px rgba(0, 229, 255, 0.08);
    }

    .character-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .character-placeholder {
      font-family: "Orbitron", sans-serif;
      font-size: 2.7rem;
      letter-spacing: 0.12em;
      color: rgba(191, 255, 255, 0.82);
    }

    .memo-box {
      flex: 1;
      min-height: 220px;
      display: flex;
      flex-direction: column;
    }

    .memo-box label {
      margin-bottom: 8px;
      font-family: "Orbitron", sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.14em;
      color: #9df7ff;
    }

    #user-memo {
      flex: 1;
      resize: none;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid rgba(0, 229, 255, 0.28);
      background: rgba(0, 8, 14, 0.88);
      color: #6cecff;
      font-family: "IBM Plex Sans KR", sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
      outline: none;
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.42);
      box-shadow:
        0 0 16px rgba(0, 229, 255, 0.12),
        inset 0 0 18px rgba(0, 229, 255, 0.06);
      caret-color: #8ff6ff;
    }

    #user-memo:focus {
      border-color: #00e5ff;
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.22);
    }

    #user-memo::placeholder {
      color: rgba(108, 236, 255, 0.52);
      text-shadow: none;
    }

    .location-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .location-btn {
      padding: 13px 12px;
      border-radius: 8px;
      border: 1px solid rgba(157, 247, 255, 0.45);
      background: linear-gradient(90deg, #001923, #003a5a, #001923);
      color: #bfffff;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow:
        0 0 16px rgba(0, 229, 255, 0.22),
        inset 0 0 14px rgba(0, 229, 255, 0.16);
    }

    .location-btn:hover {
      color: #ffffff;
      border-color: rgba(157, 247, 255, 0.9);
      box-shadow:
        0 0 24px rgba(0, 229, 255, 0.55),
        inset 0 0 18px rgba(0, 229, 255, 0.28);
    }

    .location-btn.locked {
      display: none;
    }

    .chat-panel {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto auto;
      grid-template-columns: 1fr;
      background: rgba(4, 2, 16, 0.78);
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    #chat-bg-video {
      grid-row: 1 / 3;
      grid-column: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      z-index: 0;
      opacity: 0.45;
      pointer-events: none;
    }

    /* Chat messages appear above the video */
    #chat-log {
      grid-row: 1;
      grid-column: 1;
      position: relative;
      z-index: 1;
      min-height: 0;
      padding: 44px 34px 26px;
      overflow-y: auto;
    }

    /* Hint buttons also appear above the video */
    .hint-row {
      grid-row: 2;
      grid-column: 1;
      position: relative;
      z-index: 1;
    }

    /* Input area is below the video */
    .chat-input-area {
      grid-row: 3;
      grid-column: 1;
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.08);
    }

    /* Area viewer should still cover everything when opened */
    .area-viewer {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    .message {
      position: relative;
      width: fit-content;
      max-width: 76%;
      margin-bottom: 26px;
      padding: 16px 18px;
      border: 2px solid rgba(105, 210, 255, 0.9);
      color: #6cecff;
      background: rgba(0, 20, 38, 0.74);
      line-height: 1.55;
      word-wrap: break-word;
      animation: fadeIn 0.25s ease-out;
      box-shadow:
        0 0 16px rgba(0, 229, 255, 0.18),
        inset 0 0 18px rgba(0, 229, 255, 0.07);
    }

    .message::after {
      content: "";
      position: absolute;
      bottom: -11px;
      width: 18px;
      height: 18px;
      background: inherit !important;
    }

    /* AI / bot bubble */
    .message.bot {
      margin-right: auto;
      margin-left: 0;
    }

    /* AI tail points toward the AI side / left side */
    .message.bot::after {
      left: -11px !important;
      top: 22px !important;
      bottom: auto !important;
      right: auto !important;

      border-left: 2px solid rgba(105, 210, 255, 0.9) !important;
      border-bottom: 2px solid rgba(105, 210, 255, 0.9) !important;
      border-right: none !important;
      border-top: none !important;

      transform: rotate(45deg) !important;
    }

    /* User bubble */
    .message.user {
      margin-left: auto;
      margin-right: 0;
      color: #dffcff;
      background: rgba(8, 35, 62, 0.78);
    }

    /* User tail points toward the user side / right side */
    .message.user::after {
      right: -11px !important;
      top: 22px !important;
      bottom: auto !important;
      left: auto !important;

      border-right: 2px solid rgba(105, 210, 255, 0.9) !important;
      border-top: 2px solid rgba(105, 210, 255, 0.9) !important;
      border-left: none !important;
      border-bottom: none !important;

      transform: rotate(45deg) !important;
    }


    .message.system {
      margin: 18px auto;
      width: fit-content;
      max-width: 72%;
      text-align: center;
      color: #ff9caf;
      border-color: rgba(255, 68, 105, 0.58);
      background: rgba(95, 0, 20, 0.2);
    }

    .message.system::after {
      display: none;
    }

    .area-viewer {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 5;
      background: rgba(1, 4, 10, 0.96);
      padding: 0;
    }

    .area-viewer.active {
      display: flex;
      flex-direction: column;
    }

    .area-title {
      font-family: "Orbitron", sans-serif;
      letter-spacing: 0.16em;
      color: #8ff6ff;
      padding: 14px 18px;
    }

    .area-image-wrap {
      flex: 1;
      min-height: 0;
      border: 1px solid rgba(0, 229, 255, 0.36);
      background: rgba(0, 15, 25, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow:
        0 0 28px rgba(0, 229, 255, 0.16),
        inset 0 0 30px rgba(0, 229, 255, 0.08);
      position: relative;
    }

    .area-image-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
    }

    .area-image-stage {
      position: relative;
      width: 100%;
      max-height: 100%;
      aspect-ratio: 16 / 9;
    }

    .area-placeholder {
      color: rgba(191, 255, 255, 0.65);
      font-size: 1.2rem;
    }

    .hotspot {
      position: absolute;
      border: 2px solid transparent;
      background: rgba(255, 0, 0, 0.0);
      cursor: zoom-in;
      transition: all 0.3s ease;
      z-index: 10;
      display: none;
    }

    .hotspot:hover {
      border-color: rgba(255, 50, 50, 0.8);
      background: rgba(255, 0, 0, 0.2);
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
    }

    .hint-row {
      display: flex;
      gap: 18px;
      padding: 16px 22px 14px;
      border-top: 1px solid rgba(0, 229, 255, 0.13);
    }

    .hint-btn {
      flex: 1;
      padding: 13px 16px;
      border-radius: 14px;
      border: 1px solid rgba(157, 247, 255, 0.36);
      background: rgba(220, 220, 220, 0.12);
      color: #dffcff;
      font-size: 0.95rem;
      text-align: left;
      cursor: pointer;
      transition: 0.2s;
    }

    .hint-btn:hover {
      color: #ffffff;
      background: rgba(0, 229, 255, 0.16);
      box-shadow: 0 0 18px rgba(0, 229, 255, 0.35);
    }

    .chat-input-area {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 22px 22px;
      background: rgba(255, 255, 255, 0.08);
      border-top: 1px solid rgba(0, 229, 255, 0.15);
    }

    .terminal-symbol {
      font-family: "Orbitron", sans-serif;
      font-size: 1.6rem;
      color: #bfffff;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.8);
    }

    .chat-input-area input[type="text"] {
      flex: 1;
      padding: 13px 15px;
      border: 1px solid rgba(0, 229, 255, 0.32);
      background: rgba(230, 230, 230, 0.88);
      color: #00121a;
      font-size: 1rem;
      outline: none;
    }

    .chat-input-area input[type="text"]:focus {
      border-color: #00e5ff;
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.35);
    }

    .send-btn {
      width: 54px;
      height: 48px;
      border: 1px solid rgba(157, 247, 255, 0.45);
      background: linear-gradient(90deg, #001923, #003a5a, #001923);
      color: #bfffff;
      cursor: pointer;
      font-family: "Orbitron", sans-serif;
      font-size: 1.2rem;
      box-shadow:
        0 0 16px rgba(0, 229, 255, 0.28),
        inset 0 0 14px rgba(0, 229, 255, 0.18);
    }

    .send-btn:hover {
      color: #ffffff;
      box-shadow:
        0 0 26px rgba(0, 229, 255, 0.68),
        inset 0 0 18px rgba(0, 229, 255, 0.32);
    }

    .clue-modal-content {
      width: 96vw;
      max-width: none;
      margin: 2vh auto;
      padding: 16px;
      background: rgba(1, 4, 10, 0.96);
      border: 1px solid rgba(0, 229, 255, 0.36);
      color: #dffcff;
      text-align: center;
    }

    .clue-modal-close {
      color: #8ff6ff;
    }

    .clue-modal-title {
      font-family: "Orbitron", sans-serif;
      color: #8ff6ff;
      margin: 0 40px 12px;
    }

    .clue-modal-image-wrap {
      position: relative;
      display: inline-block;
      width: 100%;
      height: 84vh;
    }

    #clueModalImage {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid rgba(105, 210, 255, 0.9);
    }

    #clueModalVideo {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid rgba(105, 210, 255, 0.9);
      pointer-events: none;
    }

    #oxygen-overlay {
      display: none;
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: none;

      color: #ffb23f;
      font-family: "Orbitron", monospace;
      font-weight: 700;
      letter-spacing: 0.08em;

      background: transparent;
      padding: 0;
      border-radius: 0;

      text-shadow:
        0 0 4px rgba(255, 178, 63, 0.95),
        0 0 10px rgba(255, 130, 20, 0.9),
        0 0 18px rgba(255, 90, 0, 0.65);

      animation: oxygenLedFlicker 1.15s infinite;
    }

    .ending-restart-btn {
      margin-top: clamp(8px, 1.8vh, 22px);
      padding: 13px 22px;
      border-radius: 8px;
      border: 1px solid rgba(157, 247, 255, 0.65);
      background: linear-gradient(90deg, #001923, #003a5a, #001923);
      color: #bfffff;
      font-family: "Orbitron", sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow:
        0 0 18px rgba(0, 229, 255, 0.28),
        inset 0 0 14px rgba(0, 229, 255, 0.18);
    }

    .ending-restart-btn:hover {
      color: #ffffff;
      border-color: rgba(157, 247, 255, 0.95);
      box-shadow:
        0 0 26px rgba(0, 229, 255, 0.68),
        inset 0 0 18px rgba(0, 229, 255, 0.32);
    }

    @keyframes oxygenLedFlicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% {
        opacity: 1;
        filter: brightness(1.2);
      }

      20%, 24%, 55% {
        opacity: 0.45;
        filter: brightness(0.75);
      }

      72% {
        opacity: 0.85;
        filter: brightness(1);
      }
    }

    .ai-glitch-text {
      display: inline-block;
      font-family: "Orbitron", sans-serif;
      color: #8ff6ff;
      text-shadow:
        0 0 10px rgba(0, 229, 255, 0.95),
        0 0 24px rgba(0, 229, 255, 0.55);
      animation: microGlitch 1.2s infinite;
    }

    @keyframes microGlitch {
      0%,
      92%,
      100% {
        transform: translate(0, 0);
        opacity: 1;
      }

      94% {
        transform: translate(1px, -1px);
        opacity: 0.75;
      }

      96% {
        transform: translate(-1px, 1px);
        opacity: 1;
      }
    }

    .ai-random-flicker {
      display: inline-block;
      color: #ffb3c1;
      text-shadow:
        0 0 8px rgba(255, 68, 105, 0.85),
        0 0 18px rgba(0, 229, 255, 0.42);
      animation: responseWordFlicker 0.72s steps(2, end);
    }

    @keyframes responseWordFlicker {
      0% {
        opacity: 1;
        filter: blur(0);
        transform: translate(0, 0);
      }

      18% {
        opacity: 0.45;
        filter: blur(1px);
        transform: translate(-1px, 0);
      }

      32% {
        opacity: 1;
        filter: blur(0);
        transform: translate(1px, -1px);
      }

      48% {
        opacity: 0.25;
        filter: blur(1.5px);
      }

      62% {
        opacity: 1;
        filter: blur(0);
        transform: translate(0, 1px);
      }

      100% {
        opacity: 1;
        filter: blur(0);
        transform: translate(0, 0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .game-shell {
        height: auto;
        min-height: 100vh;
        grid-template-rows: auto 1fr;
      }

      .top-bar {
        flex-wrap: wrap;
        gap: 12px;
      }

      .top-status {
        width: 100%;
      }

      .top-controls {
        width: 100%;
        justify-content: flex-end;
      }

      .status-card {
        flex: 1;
        min-width: 150px;
      }

      .main-layout {
        grid-template-columns: 1fr;
      }

      .side-panel {
        border-right: none;
        border-bottom: 1px solid rgba(0, 229, 255, 0.18);
      }

      .character-card {
        height: auto;
        aspect-ratio: 4 / 5;
      }

      .chat-panel {
        min-height: 620px;
      }

      .message {
        max-width: 92%;
      }

      .hint-row {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="game-shell" data-username="{{ username }}" data-usergender="{{ usergender }}">
    <header class="top-bar">
      <div class="system-title">{{ bot_name }} // MISSION CONTROL</div>

      <div class="top-status">
        <div class="status-card">
          <div class="status-label">AIR TANK LEVEL</div>
          <div class="status-value"><span id="air-level">20</span>%</div>
        </div>

        <div class="status-card timer-card hidden" id="timer-card">
          <div class="status-label">EARTH IMPACT TIMER</div>
          <div class="status-value" id="timer-value">--:--</div>
        </div>
      </div>

      <div class="top-controls">
        <button class="audio-toggle-btn" id="sfx-toggle" type="button">SFX: ON</button>
        <button class="audio-toggle-btn" id="bgm-toggle" type="button">BGM: ON</button>

        <button class="close-btn" onclick="window.location.href='{{ url_for('index') }}'">
          항해를 종료
        </button>
      </div>
    </header>

    <!-- Air Level Warning Box -->
    <div id="air-warning-box" class="warning-box hidden">
      <div class="warning-content">
        ⚠️ 산소 잔량 <span id="air-warning-level">20</span>% 점검 필요 ⚠️
      </div>
    </div>

    <main class="main-layout">
      <aside class="side-panel">
        <div class="character-card">
          {% if usergender == "여성" %}
          <img src="{{ url_for('static', filename='images/chatbot/Woman_Profile.png') }}" alt="User Character"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
          <div class="character-placeholder" style="display: none">YCH</div>
          {% elif usergender == "남성" %}
          <img src="{{ url_for('static', filename='images/chatbot/Man_Profile.png') }}" alt="User Character"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
          <div class="character-placeholder" style="display: none">YCH</div>
          {% else %}
          <div class="character-placeholder">YCH</div>
          {% endif %}
        </div>

        <div class="memo-box">
          <label for="user-memo">USER MEMO</label>
          <textarea id="user-memo" placeholder="단서를 기록하세요..."></textarea>
        </div>

        <div class="location-buttons">
          <button class="location-btn locked" data-area="living" id="living-btn">
            View Living Area
          </button>

          <button class="location-btn locked" data-area="cargo" id="cargo-btn">
            View Cargo Bay
          </button>

          <button class="location-btn locked" data-area="cockpit" id="cockpit-btn">
            View Cockpit
          </button>
        </div>
      </aside>

      <section class="chat-panel">
        <video id="chat-bg-video" autoplay muted loop playsinline preload="metadata">
          <source src="/static/videos/chatbot/AI_P1_Wait.mp4" type="video/mp4">
        </video>
        <div id="chat-log"></div>

        <div class="area-viewer" id="area-viewer">
          <div class="area-title" id="area-title">AREA VIEW</div>
          <div class="area-image-wrap">
            <div class="area-image-stage">
              <img id="area-image" src="" alt="Area Image" style="display: none" />

              <!-- Livingarea Hotspots -->
              <div id="hotspot-food" class="hotspot" style="left: 3%; top: 18%; width: 25%; height: 35%;"></div>
              <div id="hotspot-system" class="hotspot" style="left: 65%; top: 33%; width: 10%; height: 10%;"></div>
              <div id="hotspot-message" class="hotspot" style="left: 51%; top: 31%; width: 7%; height: 14%;"></div>

              <!-- Cargo Hotspots -->
              <div id="hotspot-cargo-empty" class="hotspot"
                style="left: 65%; top: 22%; width: 22%; height: 40%; display: none;"></div>
              <div id="hotspot-cargo-oxygen" class="hotspot"
                style="left: 14%; top: 38%; width: 20%; height: 30%; display: none;"></div>

              <!-- Cockpit Hotspots -->
              <div id="hotspot-cockpit-main-interface" class="hotspot"
                style="left: 30%; top: 18%; width: 24%; height: 18%; display: none;"></div>
              <div id="hotspot-cockpit-sub-interface" class="hotspot"
                style="left: 60%; top: 45%; width: 18%; height: 18%; display: none;"></div>
              <div id="hotspot-cockpit-camera" class="hotspot"
                style="left: 58%; top: 9%; width: 25%; height: 25%; display: none;"></div>
              <div id="hotspot-cockpit-order-message" class="hotspot"
                style="left: 24%; top: 64%; width: 28%; height: 14%; display: none;"></div>
            </div>
            <div class="area-placeholder" id="area-placeholder">
              AREA IMAGE NOT FOUND
            </div>
          </div>
        </div>

        <div class="hint-row" id="hint-row">
          <button class="hint-btn" data-question="내가 얼마나 잤지?">
            내가 얼마나 잤지?
          </button>
          <button class="hint-btn" data-question="지금 어디쯤이야?">
            지금 어디쯤이야?
          </button>
          <button class="hint-btn" data-question="산소는 왜 떨어진 거지?">
            산소는 왜 떨어진 거지?
          </button>
        </div>

        <div class="chat-input-area">
          <span class="terminal-symbol">&gt;</span>
          <input type="text" id="user-message" placeholder="명령 또는 질문을 입력하세요..." autocomplete="off" />
          <button class="send-btn" id="send-btn">↵</button>
        </div>
      </section>
    </main>
  </div>

  <!-- Clue Modal -->
  <!-- Clue Modal -->
  <div class="modal" id="clueModal">
    <div class="modal-content clue-modal-content">
      <button class="modal-close clue-modal-close" data-close-modal="clueModal">
        &times;
      </button>

      <h2 id="clueModalTitle" class="clue-modal-title">
        CLUE DETAIL
      </h2>

      <div id="clueModalImageWrap" class="clue-modal-image-wrap">
        <img id="clueModalImage" src="" alt="Clue Detail" />
        <video id="clueModalVideo" autoplay loop playsinline></video>

        <div id="oxygen-overlay">
          20%
        </div>
      </div>
    </div>
  </div>

  <audio id="page-bgm" src="{{ url_for('static', filename='audio/chatbot/Holst_Mars.mp3') }}" preload="none" loop></audio>
  <audio id="ambient-sfx" src="{{ url_for('static', filename='audio/chatbot/Ambient.mp3') }}" preload="none" loop></audio>
  <script src="{{ url_for('static', filename='js/audio-controls.js') }}"></script>

  <script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
</body>

</html>
